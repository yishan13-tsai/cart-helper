services:
  - type: web
    runtime: node
    name: cart-helper
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /healthz
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VAULTSAGE_API_KEY
        sync: false
      - key: VAULTSAGE_BASE_URL
        value: https://api.vaultsage.ai
      - key: NODE_VERSION
        value: '20'
